[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && cd backend && python manage.py collectstatic --noinput && python manage.py migrate"

[deploy]
startCommand = "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "web"
